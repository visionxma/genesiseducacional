<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388E3C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Céu -->
  <rect width="800" height="600" fill="url(#sky)" />

  <!-- Sol -->
  <circle cx="680" cy="100" r="60" fill="#FFD700" opacity="0.9"/>
  <circle cx="680" cy="100" r="75" fill="#FFD700" opacity="0.2"/>

  <!-- Nuvens -->
  <g opacity="0.85">
    <ellipse cx="120" cy="90" rx="60" ry="30" fill="white"/>
    <ellipse cx="160" cy="75" rx="50" ry="28" fill="white"/>
    <ellipse cx="80" cy="85" rx="40" ry="22" fill="white"/>
  </g>
  <g opacity="0.75">
    <ellipse cx="420" cy="70" rx="50" ry="25" fill="white"/>
    <ellipse cx="460" cy="58" rx="40" ry="22" fill="white"/>
    <ellipse cx="385" cy="68" rx="35" ry="18" fill="white"/>
  </g>

  <!-- Colinas -->
  <ellipse cx="200" cy="480" rx="320" ry="180" fill="#66BB6A"/>
  <ellipse cx="620" cy="500" rx="280" ry="160" fill="#4CAF50"/>

  <!-- Chão -->
  <rect x="0" y="460" width="800" height="140" fill="url(#ground)"/>

  <!-- Árvore esquerda -->
  <rect x="60" y="360" width="18" height="120" fill="#5D4037"/>
  <ellipse cx="69" cy="340" rx="45" ry="55" fill="#2E7D32"/>
  <ellipse cx="50" cy="360" rx="30" ry="35" fill="#388E3C"/>
  <ellipse cx="88" cy="355" rx="28" ry="32" fill="#43A047"/>

  <!-- Árvore direita -->
  <rect x="700" y="340" width="18" height="130" fill="#5D4037"/>
  <ellipse cx="709" cy="318" rx="50" ry="58" fill="#1B5E20"/>
  <ellipse cx="688" cy="335" rx="32" ry="38" fill="#2E7D32"/>
  <ellipse cx="728" cy="330" rx="30" ry="34" fill="#388E3C"/>

  <!-- Planta/folhas decorativas no chão -->
  <g transform="translate(320, 430)">
    <ellipse cx="0" cy="0" rx="12" ry="28" fill="#66BB6A" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="12" ry="28" fill="#4CAF50" transform="rotate(10)"/>
    <ellipse cx="0" cy="0" rx="12" ry="28" fill="#81C784" transform="rotate(40)"/>
  </g>
  <g transform="translate(480, 445)">
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#66BB6A" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#4CAF50" transform="rotate(15)"/>
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#81C784" transform="rotate(45)"/>
  </g>

  <!-- Edifício escola central -->
  <rect x="280" y="290" width="240" height="175" fill="#FFFFFF" rx="4"/>
  <rect x="280" y="270" width="240" height="30" fill="#1A237E" rx="2"/>
  <!-- Telhado triangular -->
  <polygon points="265,270 400,210 535,270" fill="#1565C0"/>
  <!-- Janelas -->
  <rect x="305" y="315" width="45" height="40" fill="#90CAF9" rx="2"/>
  <rect x="377" y="315" width="45" height="40" fill="#90CAF9" rx="2"/>
  <rect x="449" y="315" width="45" height="40" fill="#90CAF9" rx="2"/>
  <rect x="305" y="375" width="45" height="40" fill="#90CAF9" rx="2"/>
  <rect x="449" y="375" width="45" height="40" fill="#90CAF9" rx="2"/>
  <!-- Porta -->
  <rect x="370" y="390" width="60" height="75" fill="#5D4037" rx="3"/>
  <circle cx="423" cy="430" r="4" fill="#FFD700"/>
  <!-- Placa do instituto -->
  <rect x="310" y="278" width="180" height="16" fill="transparent"/>
  <text x="400" y="291" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">INSTITUTO GÊNESIS</text>

  <!-- Bandeirinha no topo -->
  <line x1="400" y1="210" x2="400" y2="180" stroke="#5D4037" stroke-width="2"/>
  <polygon points="400,180 428,192 400,204" fill="#FFD700"/>

  <!-- Caminho/calçada -->
  <path d="M 370 465 L 340 600 L 460 600 L 430 465 Z" fill="#BCAAA4"/>
  <path d="M 375 465 L 345 600 L 455 600 L 425 465 Z" fill="#D7CCC8"/>

  <!-- Pessoas estilizadas -->
  <!-- Pessoa 1 -->
  <g transform="translate(170, 390)">
    <circle cx="0" cy="-30" r="14" fill="#FFCC80"/>
    <rect x="-10" y="-16" width="20" height="30" fill="#1565C0" rx="3"/>
    <rect x="-14" y="14" width="10" height="28" fill="#1A237E" rx="2"/>
    <rect x="4" y="14" width="10" height="28" fill="#1A237E" rx="2"/>
  </g>
  <!-- Pessoa 2 -->
  <g transform="translate(620, 400)">
    <circle cx="0" cy="-30" r="14" fill="#FFAB91"/>
    <rect x="-10" y="-16" width="20" height="30" fill="#E91E63" rx="3"/>
    <rect x="-14" y="14" width="10" height="28" fill="#880E4F" rx="2"/>
    <rect x="4" y="14" width="10" height="28" fill="#880E4F" rx="2"/>
  </g>

  <!-- Texto decorativo no rodapé da imagem -->
  <rect x="0" y="555" width="800" height="45" fill="#1A237E" opacity="0.85"/>
  <text x="400" y="583" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Educação que Transforma Comunidades</text>
</svg>
